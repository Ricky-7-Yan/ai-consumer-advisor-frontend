<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>诊断报告调试</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #1a1a2e; color: white; }
        .test-btn { padding: 10px 20px; margin: 10px; background: #00d4ff; border: none; border-radius: 5px; cursor: pointer; }
        .result { margin-top: 20px; padding: 10px; border-radius: 5px; }
        .success { background: #10b981; }
        .error { background: #ef4444; }
        pre { background: #0f0f1a; padding: 10px; border-radius: 5px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>诊断报告调试工具</h1>
    <button class="test-btn" onclick="testAPI()">测试 API</button>
    <button class="test-btn" onclick="testRender()">测试渲染</button>
    <button class="test-btn" onclick="testAll()">全部测试</button>
    
    <div id="result"></div>
    
    <script>
        async function testAPI() {
            const result = document.getElementById('result');
            result.innerHTML = '<div class="result">正在测试 API...</div>';
            
            try {
                const response = await fetch('/api/diagnostic/1');
                const data = await response.json();
                
                if (data.hasData) {
                    result.innerHTML = `
                        <div class="result success">✅ API 测试通过</div>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                } else {
                    result.innerHTML = '<div class="result error">❌ API 返回无数据</div>';
                }
            } catch (error) {
                result.innerHTML = `<div class="result error">❌ API 测试失败: ${error.message}</div>`;
            }
        }
        
        async function testRender() {
            const result = document.getElementById('result');
            result.innerHTML = '<div class="result">正在测试渲染...</div>';
            
            try {
                const response = await fetch('/api/diagnostic/1');
                const report = await response.json();
                
                if (!report.hasData) {
                    result.innerHTML = '<div class="result error">❌ 无数据可渲染</div>';
                    return;
                }
                
                const scoreColor = report.overview.rationalityScore >= 80 ? '#10b981' : 
                                   report.overview.rationalityScore >= 60 ? '#3b82f6' :
                                   report.overview.rationalityScore >= 40 ? '#f59e0b' : '#ef4444';
                
                result.innerHTML = `
                    <div class="result success">✅ 渲染测试通过</div>
                    <div style="display: grid; gap: 20px; margin-top: 20px;">
                        <div style="padding: 24px; background: rgba(255,255,255,0.1); border-radius: 12px;">
                            <div style="display: flex; align-items: center; gap: 24px;">
                                <div style="position: relative; width: 120px; height: 120px;">
                                    <svg viewBox="0 0 120 120" style="transform: rotate(-90deg);">
                                        <circle cx="60" cy="60" r="52" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="12"/>
                                        <circle cx="60" cy="60" r="52" fill="none" stroke="${scoreColor}" stroke-width="12"
                                            stroke-dasharray="${report.overview.rationalityScore * 3.27} 327" stroke-linecap="round"/>
                                    </svg>
                                    <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center;">
                                        <div style="font-size: 28px; font-weight: 700; color: ${scoreColor};">${report.overview.rationalityScore}</div>
                                        <div style="font-size: 11px; color: #999;">理性指数</div>
                                    </div>
                                </div>
                                <div style="flex: 1;">
                                    <div style="font-size: 20px; font-weight: 600; margin-bottom: 8px;">${report.conclusions[0]?.title || '诊断中...'}</div>
                                    <div style="color: #999; font-size: 13px; line-height: 1.6;">${report.conclusions[0]?.content || ''}</div>
                                </div>
                            </div>
                        </div>

                        <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px;">
                            <div style="padding: 20px; background: rgba(255,255,255,0.1); border-radius: 12px; text-align: center;">
                                <div style="font-size: 28px; font-weight: 700; color: #00d4ff;">${report.overview.totalAnalyzed}</div>
                                <div style="font-size: 12px; color: #999;">累计分析</div>
                            </div>
                            <div style="padding: 20px; background: rgba(255,255,255,0.1); border-radius: 12px; text-align: center;">
                                <div style="font-size: 28px; font-weight: 700; color: #10b981;">¥${report.overview.totalSaved.toLocaleString()}</div>
                                <div style="font-size: 12px; color: #999;">累计节省</div>
                            </div>
                            <div style="padding: 20px; background: rgba(255,255,255,0.1); border-radius: 12px; text-align: center;">
                                <div style="font-size: 28px; font-weight: 700; color: #ef4444;">${report.overview.rejectRate}%</div>
                                <div style="font-size: 12px; color: #999;">拒绝率</div>
                            </div>
                            <div style="padding: 20px; background: rgba(255,255,255,0.1); border-radius: 12px; text-align: center;">
                                <div style="font-size: 28px; font-weight: 700; color: #f59e0b;">¥${report.overview.monthlySaved.toLocaleString()}</div>
                                <div style="font-size: 12px; color: #999;">本月节省</div>
                            </div>
                        </div>
                    </div>
                `;
            } catch (error) {
                result.innerHTML = `<div class="result error">❌ 渲染测试失败: ${error.message}</div>`;
            }
        }
        
        async function testAll() {
            await testAPI();
            await testRender();
        }
    </script>
</body>
</html>
